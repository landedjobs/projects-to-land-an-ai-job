name: Link check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Monday 06:00 UTC — catches links that rot after merge.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --accept 200,206,429
            --exclude-mail
            './**/*.md'
          fail: false

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected by lychee"
          content-filepath: ./lychee/out.md
          labels: broken-links, automated
